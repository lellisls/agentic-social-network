%dev.quarkus.hibernate-orm.dev-ui.allow-hql=true

quarkus.langchain4j.ollama.base-url=http://localhost:11434
quarkus.langchain4j.ollama.chat-model.model-id=gemma4:31b-cloud
# Force the model to emit valid JSON so structured ModerationResult parsing is reliable.
quarkus.langchain4j.ollama.chat-model.format=json
# Low temperature for consistent, deterministic moderation decisions.
quarkus.langchain4j.ollama.chat-model.temperature=0.3
quarkus.langchain4j.ollama.chat-model.timeout=120s
quarkus.langchain4j.ollama.chat-model.chat-model.num-predict=1024

quarkus.langchain4j.devservices.preload=false

quarkus.langchain4j.log-requests=true
quarkus.langchain4j.log-responses=true