<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Network</title>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    .post { border-bottom: 1px solid #eee; padding: 0.75rem 0; }
    .meta { font-size: 0.8rem; color: #888; margin-bottom: 0.25rem; }
    .controls { margin-top: 1rem; display: flex; gap: 0.5rem; align-items: center; }
    button { cursor: pointer; padding: 0.4rem 0.8rem; }
    button:disabled { opacity: 0.4; cursor: default; }
    form { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 2px solid #ccc; }
    input, textarea { padding: 0.4rem; font-size: 1rem; font-family: inherit; }
    textarea { resize: vertical; min-height: 80px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    const { useState, useEffect, createElement: h } = React;
    const PAGE_SIZE = 20;

    function NewPostForm({ onCreated }) {
      const [author, setAuthor]   = useState('');
      const [content, setContent] = useState('');

      function submit(e) {
        e.preventDefault();
        fetch('/posts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ author, content })
        }).then(r => {
          if (r.ok) { setAuthor(''); setContent(''); onCreated(); }
        });
      }

      return h('form', { onSubmit: submit },
        h('input',    { placeholder: 'Your name', value: author,  onChange: e => setAuthor(e.target.value),  required: true }),
        h('textarea', { placeholder: 'What\'s on your mind?', value: content, onChange: e => setContent(e.target.value), required: true }),
        h('button',   { type: 'submit' }, 'Post')
      );
    }

    function App() {
      const [posts, setPosts]     = useState([]);
      const [page, setPage]       = useState(0);
      const [hasMore, setHasMore] = useState(true);

      function load(p) {
        fetch(`/posts?page=${p}&size=${PAGE_SIZE}`)
          .then(r => r.json())
          .then(data => { setPosts(data); setHasMore(data.length === PAGE_SIZE); });
      }

      useEffect(() => { load(page); }, [page]);

      function handleCreated() { setPage(0); load(0); }

      return h('div', null,
        h('h1', null, 'Posts'),
        h(NewPostForm, { onCreated: handleCreated }),
        posts.map(p =>
          h('div', { className: 'post', key: p.id },
            h('div', { className: 'meta' },
              h('strong', null, p.author), ` · ${new Date(p.timestamp).toLocaleString()}`
            ),
            h('div', null, p.content)
          )
        ),
        h('div', { className: 'controls' },
          h('button', { onClick: () => setPage(p => p - 1), disabled: page === 0 }, '← Prev'),
          h('span', null, `Page ${page + 1}`),
          h('button', { onClick: () => setPage(p => p + 1), disabled: !hasMore }, 'Next →')
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
