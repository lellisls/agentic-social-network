<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Network</title>
  <style>
    body { font-family: sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    h2 { border-bottom: 1px solid #ccc; padding-bottom: 0.3rem; }
    .post { border-bottom: 1px solid #eee; padding: 0.75rem 0; }
    .meta { font-size: 0.8rem; color: #888; margin-bottom: 0.25rem; }
    .controls { margin-top: 1rem; display: flex; gap: 0.5rem; align-items: center; }
    button { cursor: pointer; padding: 0.4rem 0.8rem; }
    button:disabled { opacity: 0.4; cursor: default; }
    .btn-approve { background: #2ecc71; color: #fff; border: none; border-radius: 4px; }
    .btn-reject  { background: #e74c3c; color: #fff; border: none; border-radius: 4px; }
    .review-row { display: flex; gap: 1rem; align-items: flex-start; }
    .review-row .message { flex: 1; }
    .ai-opinion { flex: 0 0 240px; font-size: 0.85rem; border-left: 3px solid #ccc; padding: 0.5rem 0.75rem; background: #fafafa; border-radius: 0 4px 4px 0; }
    .ai-opinion.approved { border-left-color: #2ecc71; }
    .ai-opinion.rejected { border-left-color: #e74c3c; }
    .ai-opinion.pending-human { border-left-color: #f39c12; }
    .ai-opinion .score { font-size: 1.1rem; font-weight: bold; margin-bottom: 0.2rem; }
    .score-bar-wrap { background: #e0e0e0; border-radius: 4px; height: 6px; margin: 0.3rem 0; }
    .score-bar { height: 6px; border-radius: 4px; background: #2ecc71; transition: width 0.3s; }
    .ai-opinion.rejected .score-bar { background: #e74c3c; }
    .ai-opinion.approved .score { color: #27ae60; }
    .ai-opinion.rejected .score { color: #c0392b; }
    .ai-opinion .reason { color: #555; }
    .ai-opinion .pending { color: #999; font-style: italic; }
    .btn-delete { background: #c0392b; color: #fff; border: none; border-radius: 4px; font-size: 0.8rem; }
    .rejected-post { border-bottom: 1px solid #eee; padding: 0.75rem 0; }
    .rejected-post .content { color: #555; margin: 0.25rem 0; }
    .delete-hint { font-size: 0.75rem; color: #aaa; margin-left: 0.5rem; }
    form { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 2px solid #ccc; }
    input, textarea { padding: 0.4rem; font-size: 1rem; font-family: inherit; }
    textarea { resize: vertical; min-height: 80px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    const { useState, useEffect, createElement: h } = React;
    const PAGE_SIZE = 20;

    function NewPostForm({ onCreated }) {
      const [author, setAuthor]   = useState('');
      const [content, setContent] = useState('');
      const [msg, setMsg]         = useState('');

      function submit(e) {
        e.preventDefault();
        fetch('/posts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ author, content })
        }).then(r => {
          if (r.ok) {
            setAuthor(''); setContent('');
            setMsg('Post submitted — awaiting AI + human review.');
            onCreated();
          }
        });
      }

      return h('form', { onSubmit: submit },
        h('input',    { placeholder: 'Your name', value: author, onChange: e => setAuthor(e.target.value), required: true }),
        h('textarea', { placeholder: "What's on your mind?", value: content, onChange: e => setContent(e.target.value), required: true }),
        h('button',   { type: 'submit' }, 'Post'),
        msg && h('small', { style: { color: '#27ae60' } }, msg)
      );
    }

    function AiOpinion({ post }) {
      if (post.aiScore == null) {
        return h('div', { className: 'ai-opinion' },
          h('div', { className: 'verdict' }, '🤖 AI Review'),
          h('div', { className: 'pending' }, 'Awaiting AI opinion…')
        );
      }
      const cls = post.aiApproved === true ? 'approved' : post.aiApproved === false ? 'rejected' : 'pending-human';
      const label = post.aiApproved === true ? '🤖 ✓ AI Approved'
                  : post.aiApproved === false ? '🤖 ✗ AI Flagged'
                  : '🤖 ⚠ Needs Human Review';
      return h('div', { className: `ai-opinion ${cls}` },
        h('div', { className: 'verdict' }, label),
        h('div', null,
          h('div', { className: 'score' }, `Risk score: ${post.aiScore.toFixed(1)} / 100`),
          h('div', { className: 'score-bar-wrap' },
            h('div', { className: 'score-bar', style: { width: `${post.aiScore}%` } })
          )
        ),
        post.aiReason && h('div', { className: 'reason' }, post.aiReason)
      );
    }

    function ModerationQueue({ refresh, onAction }) {
      const [pending, setPending] = useState([]);

      function load() {
        fetch('/posts/pending')
          .then(r => r.ok ? r.json() : Promise.reject(r))
          .then(setPending)
          .catch(() => setPending([]));
      }

      useEffect(() => { load(); }, [refresh]);

      function decide(id, approved) {
        fetch(`/posts/${id}/moderate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ approved })
        }).then(() => { load(); onAction(); });
      }

      return h('div', null,
        h('h2', null, `Moderation Queue (${pending.length})`),
        pending.length === 0
          ? h('p', { style: { color: '#999' } }, 'Nothing pending human review.')
          : pending.map(p =>
              h('div', { className: 'post', key: p.id },
                h('div', { className: 'review-row' },
                  h('div', { className: 'message' },
                    h('div', { className: 'meta' }, h('strong', null, p.author), ` · ${new Date(p.timestamp).toLocaleString()}`),
                    h('div', null, p.content),
                    h('div', { className: 'controls' },
                      h('button', { className: 'btn-approve', onClick: () => decide(p.id, true) }, '✓ Approve'),
                      h('button', { className: 'btn-reject',  onClick: () => decide(p.id, false) }, '✗ Reject')
                    )
                  ),
                  h(AiOpinion, { post: p })
                )
              )
            )
      );
    }

    function Feed({ refresh }) {
      const [posts, setPosts]     = useState([]);
      const [page, setPage]       = useState(0);
      const [hasMore, setHasMore] = useState(true);

      function load() {
        fetch(`/posts?page=${page}&size=${PAGE_SIZE}`)
          .then(r => r.json())
          .then(data => { setPosts(data); setHasMore(data.length === PAGE_SIZE); });
      }

      useEffect(() => { load(); }, [page, refresh]);

      return h('div', null,
        h('h2', null, 'Published Posts'),
        posts.length === 0
          ? h('p', { style: { color: '#999' } }, 'No published posts yet.')
          : posts.map(p =>
              h('div', { className: 'post', key: p.id },
                h('div', { className: 'meta' }, h('strong', null, p.author), ` · ${new Date(p.timestamp).toLocaleString()}`),
                h('div', null, p.content)
              )
            ),
        h('div', { className: 'controls' },
          h('button', { onClick: () => setPage(p => p - 1), disabled: page === 0 }, '← Prev'),
          h('span', null, `Page ${page + 1}`),
          h('button', { onClick: () => setPage(p => p + 1), disabled: !hasMore }, 'Next →')
        )
      );
    }

    function RejectedList({ refresh }) {
      const [posts, setPosts] = useState([]);
      const [now, setNow] = useState(Date.now());

      function load() {
        fetch('/posts/rejected').then(r => r.json()).then(setPosts).catch(() => setPosts([]));
      }

      useEffect(() => { load(); setNow(Date.now()); }, [refresh]);

      function canDelete(post) {
        return post.aiApproved === false || (now - new Date(post.timestamp).getTime()) >= 24 * 60 * 60 * 1000;
      }

      function timeUntilDeletion(post) {
        if (post.aiApproved === false) return null;
        const ms = 24 * 60 * 60 * 1000 - (now - new Date(post.timestamp).getTime());
        if (ms <= 0) return null;
        const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000);
        return `deletable in ${h}h ${m}m`;
      }

      function deletePost(id) {
        fetch(`/posts/${id}`, { method: 'DELETE' }).then(r => { if (r.ok || r.status === 204) load(); });
      }

      return h('div', null,
        h('h2', null, `Auto-Rejected Posts (${posts.length})`),
        posts.length === 0
          ? h('p', { style: { color: '#999' } }, 'No auto-rejected posts.')
          : posts.map(p =>
              h('div', { className: 'rejected-post', key: p.id },
                h('div', { className: 'meta' },
                  h('strong', null, p.author), ` · ${new Date(p.timestamp).toLocaleString()}`,
                  p.aiScore != null && h('span', { style: { marginLeft: '0.5rem', color: '#c0392b' } }, `score: ${p.aiScore.toFixed(1)}`)
                ),
                h('div', { className: 'content' }, p.content),
                p.aiReason && h('div', { style: { fontSize: '0.8rem', color: '#888', marginTop: '0.2rem' } }, p.aiReason),
                h('div', { className: 'controls' },
                  h('button', {
                    className: 'btn-delete',
                    disabled: !canDelete(p),
                    onClick: () => deletePost(p.id)
                  }, '🗑 Delete'),
                  !canDelete(p) && h('span', { className: 'delete-hint' }, timeUntilDeletion(p))
                )
              )
            )
      );
    }

    function App() {
      const [tick, setTick] = useState(0);
      const refresh = () => setTick(t => t + 1);

      useEffect(() => {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/posts/events`;
        const ws = new WebSocket(wsUrl);
        ws.onmessage = (event) => {
          if (event.data === 'refresh') {
            refresh();
          }
        };
        return () => ws.close();
      }, []);

      return h('div', null,
        h('h1', null, 'Social Network'),
        h(NewPostForm, { onCreated: refresh }),
        h(ModerationQueue, { refresh: tick, onAction: refresh }),
        h(RejectedList, { refresh: tick }),
        h(Feed, { refresh: tick })
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
